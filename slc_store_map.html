<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SL&C 매장 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=hfkhrx6jrf_Client_ID"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0ece4;
    --text-muted: #888;
    --accent: #c8a96e;
    --chai: #d4541a;
    --hausom: #2b7fc9;
    --butcher: #c92b2b;
    --seorjae: #2bc96a;
    --itamae: #c92ba0;
    --chaidim: #e8a020;
    --header-h: 56px;
    --filter-h: 48px;
    --search-h: 48px;
    --panel-peek: 80px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

  /* HEADER */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
    z-index: 1000;
  }
  .logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 18px;
    color: var(--accent); letter-spacing: 2px;
    white-space: nowrap;
  }
  .logo-sub { display: none; }
  .header-filters { display: none; }

  /* MOBILE FILTER BAR */
  .filter-bar {
    position: fixed;
    top: var(--header-h); left: 0; right: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding: 0 12px; gap: 8px; scrollbar-width: none; z-index: 999;
  }

  /* BRAND BUTTONS */
  .brand-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .brand-btn.active { color: #000; font-weight: 700; border-color: transparent; }
  .brand-btn[data-brand="all"].active    { background: var(--accent); }
  .brand-btn[data-brand="chai797"].active { background: var(--chai); color: #fff; }
  .brand-btn[data-brand="hausom"].active  { background: var(--hausom); color: #fff; }
  .brand-btn[data-brand="butcher"].active { background: var(--butcher); color: #fff; }
  .brand-btn[data-brand="seorjae"].active { background: var(--seorjae); }
  .brand-btn[data-brand="itamae"].active  { background: var(--itamae); color: #fff; }
  .brand-btn[data-brand="chaidim"].active { background: var(--chaidim); }
  .count-badge {
    margin-left: 3px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    padding: 1px 5px;
    font-size: 10px;
  }

  /* MAP */
  #map {
    position: fixed;
    top: calc(var(--header-h) + var(--filter-h) + var(--search-h)); transition: top 0.2s;
    left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  /* MOBILE BOTTOM PANEL */
  .bottom-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    z-index: 500;
    display: flex; flex-direction: column;
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    transform: translateY(calc(100% - var(--panel-peek)));
    max-height: 75vh;
  }
  .bottom-panel.expanded { transform: translateY(0); }

  .panel-handle-wrap {
    padding: 10px 16px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; flex-shrink: 0;
    touch-action: none;
  }
  .panel-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }
  .panel-meta {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .panel-count { font-size: 12px; color: var(--text-muted); }

  /* DESKTOP SIDEBAR */
  .sidebar { display: none; }

  /* STORE LIST */
  .store-list {
    overflow-y: auto; flex: 1;
  }
  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .store-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex; gap: 10px; align-items: flex-start;
    transition: background 0.15s;
    touch-action: manipulation;
  }
  .store-item:active { background: var(--surface2); }
  .store-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .brand-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .store-info { flex: 1; min-width: 0; }
  .store-name  { font-size: 15px; font-weight: 500; color: var(--text); }
  .store-brand { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .store-addr  { font-size: 13px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .store-tel   { font-size: 13px; color: var(--accent); margin-top: 3px; }
  .store-promo {
    font-size: 12px; color: #c8a96e;
    background: rgba(200,169,110,0.1);
    border-left: 2px solid #c8a96e;
    padding: 4px 8px; margin-top: 5px;
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }
  .store-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .btn-nav {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 14px;
    background: #03C75A; color: #fff;
    font-size: 13px; font-weight: 700;
    border-radius: 8px; text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    touch-action: manipulation;
  }
  .btn-call {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 14px;
    background: var(--surface2); color: var(--accent);
    border: 1px solid var(--border);
    font-size: 12px; font-weight: 500;
    border-radius: 8px; text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    touch-action: manipulation;
  }
  .no-results { padding: 30px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* SEARCH BAR */
  .search-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 6px 14px 6px 30px;
    width: 160px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }
  .search-input:focus { border-color: var(--accent); width: 200px; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 12px; color: var(--text-muted);
    pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px; color: var(--text-muted);
    cursor: pointer; display: none;
    background: none; border: none; padding: 0;
    line-height: 1;
  }
  .search-clear.visible { display: block; }

  /* 모바일 검색바 */
  .mobile-search {
    position: fixed;
    top: calc(var(--header-h) + var(--filter-h));
    left: 0; right: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    z-index: 998;
    display: flex;
    gap: 8px;
  }
  .mobile-search .search-input { width: 100%; flex: 1; }
  .mobile-search .search-input:focus { width: 100%; }

  /* 네이버 지도 인포윈도우 커스텀 스타일 */
  .custom-infowindow {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    min-width: 220px;
    color: var(--text);
    position: relative;
  }
  .infowindow-close {
    position: absolute;
    top: 8px;
    right: 10px;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }
  .popup-name  { font-weight: 700; font-size: 15px; margin-bottom: 3px; padding-right: 20px; }
  .popup-brand { font-size: 11px; margin-bottom: 7px; }
  .popup-addr  { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 5px; }
  .popup-tel   { font-size: 12px; color: var(--accent); margin-bottom: 10px; }
  .popup-promo {
    background: linear-gradient(135deg, #c8a96e22, #c8a96e11);
    border: 1px solid #c8a96e55;
    border-radius: 6px;
    padding: 7px 10px;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--accent2, #e8c98e);
    line-height: 1.5;
  }
  .popup-promo .promo-label {
    font-size: 10px;
    font-weight: 700;
    color: #c8a96e;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .popup-actions { display: flex; gap: 8px; }

  /* DESKTOP 768+ */
  @media (min-width: 768px) {
    :root { --filter-h: 0px; --search-h: 0px; }

    .mobile-search { display: none; }
    .logo-sub { display: inline; color: var(--text-muted); font-weight: 600; font-size: 13px; margin-left: 8px; letter-spacing: 1px; }
    .filter-bar { display: none; }
    .header-filters {
      display: flex !important;
      gap: 8px; flex: 1;
      overflow-x: auto; scrollbar-width: none;
      align-items: center;
    }
    .header-filters::-webkit-scrollbar { display: none; }

    #map { top: var(--header-h); right: 420px; bottom: 0; }

    .bottom-panel { display: none; }

    .sidebar {
      display: flex; flex-direction: column;
      position: fixed;
      top: var(--header-h); right: 0;
      width: 420px; bottom: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 100; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header strong { color: var(--text); font-size: 16px; display: block; margin-bottom: 2px; }
    .sidebar-header span   { font-size: 13px; color: var(--text-muted); }
    .sidebar .store-list { flex: 1; }
  }
</style>
</head>

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">

    <circle cx="15" cy="15" r="7" fill="rgba(0,0,0,0.2)"/>
    <circle cx="15" cy="15" r="4.5" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
  
  return {
    content: svg,
    size: new naver.maps.Size(30, 38),
    anchor: new naver.maps.Point(15, 38)
  };
}

// 모바일 패널
const panel = document.getElementById('bottom-panel');
let panelExpanded = false;
document.getElementById('panel-handle').addEventListener('click', () => {
  panelExpanded = !panelExpanded;
  panel.classList.toggle('expanded', panelExpanded);
});
let touchStartY = 0;
document.getElementById('panel-handle').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('panel-handle').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy < -30) { panelExpanded = true; panel.classList.add('expanded'); }
  if (dy >  30) { panelExpanded = false; panel.classList.remove('expanded'); }
}, {passive:true});

function itemHTML(s, i, filter) {
  const nav = `https://map.naver.com/p/search/${encodeURIComponent(s.name)}`;
  const tel = s.tel !== '-' ? `tel:${s.tel.replace(/[^0-9]/g,'')}` : null;
  const promo = getPromo(s);
  return `<div class="store-item" data-idx="${i}" onclick="focusStore(${i},'${filter}')">
    <div class="brand-dot" style="background:${BRAND_COLORS[s.brand]}"></div>
    <div class="store-info">
      <div class="store-name">${s.name}</div>
      <div class="store-brand">${BRAND_NAMES[s.brand]} · ${s.sub}</div>
      ${promo ? `<div class="store-promo">🎉 ${promo}</div>` : ''}
      <div class="store-addr">${s.addr}</div>
      ${s.tel!=='-'?`<div class="store-tel">${s.tel}</div>`:''}
      <div class="store-actions">
        <a class="btn-nav" href="${nav}" target="_blank" onclick="event.stopPropagation()">네이버 길찾기</a>
        ${tel?`<a class="btn-call" href="${tel}" onclick="event.stopPropagation()">전화</a>`:''}
      </div>
    </div>
  </div>`;
}

function renderStores(filter) {
  // 기존 마커와 인포윈도우 제거
  markers.forEach(m => m.setMap(null));
  infoWindows.forEach(iw => iw.close());
  markers = [];
  infoWindows = [];
  
  const filtered = filter==='all' ? stores : stores.filter(s=>s.brand===filter);

  filtered.forEach((store, idx) => {
    const position = new naver.maps.LatLng(store.lat, store.lng);
    const marker = new naver.maps.Marker({
      position: position,
      map: map,
      icon: getMarkerIcon(store.brand)
    });

    const nav = `https://map.naver.com/p/search/${encodeURIComponent(store.name)}`;
    const tel = store.tel!=='-' ? `tel:${store.tel.replace(/[^0-9]/g,'')}` : null;
    
    const contentString = `
      <div class="custom-infowindow">
        <button class="infowindow-close" onclick="closeInfoWindow(${idx})">×</button>
        <div class="popup-name">${store.name}</div>
        <div class="popup-brand" style="color:${BRAND_COLORS[store.brand]}">${BRAND_NAMES[store.brand]} · ${store.sub}</div>
        ${promoHTML(store)}
        <div class="popup-addr">${store.addr}</div>
        ${store.tel!=='-'?`<div class="popup-tel">${store.tel}</div>`:''}
        <div class="popup-actions">
          <a class="btn-nav" href="${nav}" target="_blank">네이버 길찾기</a>
          ${tel?`<a class="btn-call" href="${tel}">전화</a>`:''}
        </div>
      </div>
    `;

    const infoWindow = new naver.maps.InfoWindow({
      content: contentString,
      borderWidth: 0,
      backgroundColor: 'transparent',
      disableAnchor: true,
      pixelOffset: new naver.maps.Point(0, -10)
    });

    naver.maps.Event.addListener(marker, 'click', function() {
      infoWindows.forEach(iw => iw.close());
      infoWindow.open(map, marker);
      
      if (window.innerWidth < 768) {
        panelExpanded = true;
        panel.classList.add('expanded');
        setTimeout(() => {
          const el = document.querySelector(`#m-store-list [data-idx="${idx}"]`);
          if (el) { 
            document.querySelectorAll('#m-store-list .store-item').forEach((e,i)=>e.classList.toggle('active',i===idx)); 
            el.scrollIntoView({behavior:'smooth',block:'nearest'}); 
          }
        }, 150);
      }
    });

    markers.push(marker);
    infoWindows.push(infoWindow);
    store.infoWindow = infoWindow;
    store.marker = marker;
  });

  const html = filtered.length ? filtered.map((s,i)=>itemHTML(s,i,filter)).join('') : '<div class="no-results">매장 정보가 없습니다</div>';
  document.getElementById('d-store-list').innerHTML = html;
  document.getElementById('d-sidebar-title').textContent = filter==='all'?'전체 매장':BRAND_NAMES[filter];
  document.getElementById('d-sidebar-count').textContent = `${filtered.length}개 매장`;
  document.getElementById('m-store-list').innerHTML = html;
  document.getElementById('m-panel-title').textContent = filter==='all'?'전체 매장':BRAND_NAMES[filter];
  document.getElementById('m-panel-count').textContent = `${filtered.length}개`;
}

function closeInfoWindow(idx) {
  infoWindows.forEach(iw => iw.close());
}
window.closeInfoWindow = closeInfoWindow;

function focusStore(idx, filter) {
  const filtered = filter==='all'?stores:stores.filter(s=>s.brand===filter);
  const store = filtered[idx];
  if (!store) return;
  
  map.setCenter(new naver.maps.LatLng(store.lat, store.lng));
  map.setZoom(15);
  
  infoWindows.forEach(iw => iw.close());
  if (store.infoWindow && store.marker) {
    store.infoWindow.open(map, store.marker);
  }
  
  ['d-store-list','m-store-list'].forEach(id=>{
    document.querySelectorAll(`#${id} .store-item`).forEach((el,i)=>el.classList.toggle('active',i===idx));
    document.querySelector(`#${id} [data-idx="${idx}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}
window.focusStore = focusStore;

function updateCounts() {
  const brands = ['chai797','hausom','butcher','seorjae','itamae','chaidim'];
  ['d','m'].forEach(p=>{
    const el=document.getElementById(`${p}-cnt-all`); if(el) el.textContent=stores.length;
    brands.forEach(b=>{ const e=document.getElementById(`${p}-cnt-${b}`); if(e) e.textContent=stores.filter(s=>s.brand===b).length; });
  });
}

document.querySelectorAll('.brand-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    activeFilter = btn.dataset.brand;
    document.querySelectorAll('.brand-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll(`.brand-btn[data-brand="${activeFilter}"]`).forEach(b=>b.classList.add('active'));
    renderStores(activeFilter);
    if (window.innerWidth < 768) { panelExpanded=false; panel.classList.remove('expanded'); }
  });
});

updateCounts();
renderStores('all');

// 검색 기능
let searchQuery = '';

function applySearch(q) {
  searchQuery = q.trim();
  const filtered = getFiltered(activeFilter, searchQuery);

  const html = filtered.length ? filtered.map((s,i) => itemHTML(s,i,activeFilter)).join('') : '<div class="no-results">검색 결과가 없습니다</div>';
  document.getElementById('d-store-list').innerHTML = html;
  document.getElementById('d-sidebar-title').textContent = searchQuery ? `"${searchQuery}" 검색 결과` : (activeFilter==='all'?'전체 매장':BRAND_NAMES[activeFilter]);
  document.getElementById('d-sidebar-count').textContent = `${filtered.length}개 매장`;
  document.getElementById('m-store-list').innerHTML = html;
  document.getElementById('m-panel-title').textContent = searchQuery ? `"${searchQuery}" 검색 결과` : (activeFilter==='all'?'전체 매장':BRAND_NAMES[activeFilter]);
  document.getElementById('m-panel-count').textContent = `${filtered.length}개`;

  markers.forEach(m => m.setMap(null));
  infoWindows.forEach(iw => iw.close());
  markers = [];
  infoWindows = [];
  
  filtered.forEach((store, idx) => {
    const position = new naver.maps.LatLng(store.lat, store.lng);
    const marker = new naver.maps.Marker({
      position: position,
      map: map,
      icon: getMarkerIcon(store.brand)
    });
    markers.push(marker);
  });

  if (filtered.length > 0 && searchQuery) {
    const bounds = new naver.maps.LatLngBounds();
    filtered.forEach(s => {
      bounds.extend(new naver.maps.LatLng(s.lat, s.lng));
    });
    map.fitBounds(bounds);
  }
}

function normalizeQuery(q) {
  return q
    .replace(/서울시/g, '서울특별시')
    .replace(/부산시/g, '부산광역시')
    .replace(/대구시/g, '대구광역시')
    .replace(/인천시/g, '인천광역시')
    .replace(/광주시/g, '광주광역시')
    .replace(/대전시/g, '대전광역시')
    .replace(/울산시/g, '울산광역시')
    .replace(/수원시/g, '수원특례시')
    .replace(/충남$/g, '충청남도')
    .replace(/충북$/g, '충청북도')
    .replace(/경남$/g, '경상남도')
    .replace(/경북$/g, '경상북도')
    .replace(/경기$/g, '경기도');
}

function getFiltered(brand, query) {
  let result = brand==='all' ? stores : stores.filter(s=>s.brand===brand);
  if (query) {
    const q = normalizeQuery(query.trim()).toLowerCase();
    result = result.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.addr.toLowerCase().includes(q) ||
      s.sub.toLowerCase().includes(q)
    );
  }
  return result;
}

['d-search','m-search'].forEach(id => {
  const input = document.getElementById(id);
  const clearId = id === 'd-search' ? 'd-search-clear' : 'm-search-clear';
  const clearBtn = document.getElementById(clearId);
  if (!input) return;
  input.addEventListener('input', () => {
    const q = input.value;
    const otherId = id === 'd-search' ? 'm-search' : 'd-search';
    const other = document.getElementById(otherId);
    if (other) other.value = q;
    clearBtn.classList.toggle('visible', q.length > 0);
    document.getElementById(otherId === 'd-search' ? 'd-search-clear' : 'm-search-clear')?.classList.toggle('visible', q.length > 0);
    applySearch(q);
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    const otherId = id === 'd-search' ? 'm-search' : 'd-search';
    const other = document.getElementById(otherId);
    if (other) other.value = '';
    clearBtn.classList.remove('visible');
    document.getElementById(otherId === 'd-search' ? 'd-search-clear' : 'm-search-clear')?.classList.remove('visible');
    applySearch('');
  });
});
</script>
