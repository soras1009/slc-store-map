<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL&C 매장 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0ece4;
    --text-muted: #888;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --chai: #d4541a;
    --hausom: #2b7fc9;
    --butcher: #c92b2b;
    --seorjae: #2bc96a;
    --itamae: #c92ba0;
    --chaidim: #e8a020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .logo span { color: var(--text-muted); font-weight: 600; font-size: 13px; margin-left: 8px; letter-spacing: 1px; }
  .brand-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }
  .brand-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .brand-btn.active { color: #000; font-weight: 700; border-color: transparent; }
  .brand-btn[data-brand="all"].active { background: var(--accent); color: #000; }
  .brand-btn[data-brand="chai797"].active { background: var(--chai); }
  .brand-btn[data-brand="hausom"].active { background: var(--hausom); }
  .brand-btn[data-brand="butcher"].active { background: var(--butcher); }
  .brand-btn[data-brand="seorjae"].active { background: var(--seorjae); }
  .brand-btn[data-brand="itamae"].active { background: var(--itamae); }
  .brand-btn[data-brand="chaidim"].active { background: var(--chaidim); }
  .count-badge {
    margin-left: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
  }
  .main-wrap {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #map {
    flex: 1;
    z-index: 1;
  }
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .sidebar-header strong { color: var(--text); font-size: 14px; display: block; margin-bottom: 2px; }
  .store-list {
    overflow-y: auto;
    flex: 1;
  }
  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-track { background: var(--surface); }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .store-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .store-item:hover { background: var(--surface2); }
  .store-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .store-info { flex: 1; min-width: 0; }
  .store-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .store-brand { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .store-addr { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .store-tel { font-size: 11px; color: var(--accent); margin-top: 2px; }

  /* Leaflet custom popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .popup-brand { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .popup-addr { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 4px; }
  .popup-tel { font-size: 12px; color: var(--accent); }

  .no-results {
    padding: 30px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
</style>

// 지도 초기화
const map = L.map('map', {
  center: [36.5, 127.8],
  zoom: 7,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// 커스텀 마커 아이콘 생성
function makeIcon(brand) {
  const color = BRAND_COLORS[brand];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="6" fill="rgba(0,0,0,0.3)"/>
    <circle cx="14" cy="14" r="4" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36],
    className: ''
  });
}

let markers = [];
let activeFilter = 'all';

function renderStores(filter) {
  // 마커 제거
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  const filtered = filter === 'all' ? stores : stores.filter(s => s.brand === filter);

  filtered.forEach((store, idx) => {
    const icon = makeIcon(store.brand);
    const m = L.marker([store.lat, store.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="popup-name">${store.name}</div>
      <div class="popup-brand" style="color:${BRAND_COLORS[store.brand]}">${BRAND_NAMES[store.brand]} · ${store.sub}</div>
      <div class="popup-addr">${store.addr}</div>
      ${store.tel !== '-' ? `<div class="popup-tel">📞 ${store.tel}</div>` : ''}
    `);
    markers.push({ marker: m, store, idx });
  });

  // 사이드바 렌더
  const list = document.getElementById('store-list');
  const title = document.getElementById('sidebar-title');
  const count = document.getElementById('sidebar-count');

  title.textContent = filter === 'all' ? '전체 매장' : BRAND_NAMES[filter];
  count.textContent = `${filtered.length}개 매장`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">매장 정보가 없습니다</div>';
    return;
  }

  list.innerHTML = filtered.map((s, i) => `
    <div class="store-item" data-idx="${i}" onclick="focusStore(${i}, '${filter}')">
      <div class="brand-dot" style="background:${BRAND_COLORS[s.brand]}"></div>
      <div class="store-info">
        <div class="store-name">${s.name}</div>
        <div class="store-brand">${BRAND_NAMES[s.brand]} · ${s.sub}</div>
        <div class="store-addr">${s.addr}</div>
        ${s.tel !== '-' ? `<div class="store-tel">${s.tel}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function focusStore(listIdx, filter) {
  const filtered = filter === 'all' ? stores : stores.filter(s => s.brand === filter);
  const store = filtered[listIdx];
  if (!store) return;

  map.setView([store.lat, store.lng], 15, { animate: true });

  const markerObj = markers[listIdx];
  if (markerObj) markerObj.marker.openPopup();

  // 사이드바 active
  document.querySelectorAll('.store-item').forEach((el, i) => {
    el.classList.toggle('active', i === listIdx);
  });

  // 사이드바 스크롤
  const items = document.querySelectorAll('.store-item');
  if (items[listIdx]) {
    items[listIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// 카운트 업데이트
function updateCounts() {
  document.getElementById('cnt-all').textContent = stores.length;
  ['chai797','hausom','butcher','seorjae','itamae','chaidim'].forEach(b => {
    const cnt = stores.filter(s => s.brand === b).length;
    const el = document.getElementById(`cnt-${b}`);
    if (el) el.textContent = cnt;
  });
}

// 필터 버튼
document.querySelectorAll('.brand-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.brand;
    document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStores(activeFilter);
  });
});

// 초기화
updateCounts();
renderStores('all');
</script>
